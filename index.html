<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">

  <body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow" style="width: 22rem;">

          <h1 class="card-title text-primary">Najib Khalili</h1>

          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#kontaktModal">

            <h5 class="modal-title">Kontakt</h5>

          </div>

          <div class="modal-body">
            <p>Email: najib@gmail.com</p>
            <p>Telefon: 070-0000000</p>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Stäng</button>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
